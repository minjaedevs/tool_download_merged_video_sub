name: Release

on:
  workflow_dispatch:
    inputs:
      nightly:
        description: 'nightly build (git sha version)'
        type: boolean
        default: false
      version:
        description: 'version tag for production release (e.g. 0.9.1)'
        type: string
        default: ''

permissions:
  contents: write

env:
  QT_QPA_PLATFORM: offscreen
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    name: build-windows
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -U "https://github.com/yt-dlp/Pyinstaller-Builds/releases/download/2025.09.13.221251/pyinstaller-6.16.0-py3-none-win_amd64.whl"

      - name: Determine version
        id: version
        shell: bash
        run: |
          short_sha=$(git rev-parse --short HEAD)

          if [[ "${{ github.event.inputs.nightly }}" == 'true' ]]; then
            version="nightly-$short_sha"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            version="${{ github.event.inputs.version }}"
          else
            echo "::error::Production release requires a version tag. Set the 'version' input."
            exit 1
          fi

          echo "Version: $version"
          echo "short_sha=$short_sha" >> $GITHUB_OUTPUT
          echo "version=$version"       >> $GITHUB_OUTPUT

      - name: Patch version strings
        working-directory: ./app
        shell: bash
        run: |
          version="${{ steps.version.outputs.version }}"
          github_repo="${{ github.repository }}"

          # Update __version__ in app.py (used in UI: about dialog, help dialog)
          sed -i "s/^__version__ = .*/__version__ = \"${version}\"/" ./app.py

          # Update __version__ in _version.py (used by the updater)
          sed -i "s/^__version__ = .*/__version__ = \"${version}\"/" ./_version.py

          echo "Patched app.py     -> __version__ = \"${version}\""
          echo "Patched _version.py -> __version__ = \"${version}\""

      - name: Build application
        working-directory: ./app
        shell: bash
        run: |
          pyinstaller --name=tool-download-movie --onefile --windowed \
            --icon=assets/yt-dlp-gui.ico \
            --add-data="assets;assets" \
            --add-data="root;root" \
            --hidden-import=httpx \
            --hidden-import=anyio \
            --hidden-import=charset_normalizer \
            --hidden-import=certifi \
            --hidden-import=platformdirs \
            --hidden-import=httpx_sse \
            --collect-all=qtawesome \
            --noupx \
            app.py --distpath=dist --noconfirm

      - name: Package for distribution
        working-directory: ./app
        shell: pwsh
        run: |
          # With --onefile, output is a single exe at dist/tool-download-movie.exe
          # Create zip (for manual download)
          Compress-Archive -Path dist/tool-download-movie.exe -DestinationPath ./tool-download-movie-win64.zip

          # Create a directory for release assets
          New-Item -ItemType Directory -Force release-assets | Out-Null
          # Copy the standalone .exe so it can be uploaded as a release asset
          Copy-Item dist/tool-download-movie.exe release-assets/

          Write-Host "=== dist/ contents ==="
          Get-ChildItem dist/

      - name: Upload nightly release
        if: ${{ github.event.inputs.nightly == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          body: |
            Version ${{ steps.version.outputs.version }} – `[${{ steps.version.outputs.short_sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})`
          generate_release_notes: false
          draft: false
          prerelease: true
          files: |
            app/tool-download-movie-win64.zip
            app/release-assets/tool-download-movie.exe
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Upload production release
        if: ${{ github.event.inputs.nightly == 'false' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
          files: |
            app/tool-download-movie-win64.zip
            app/release-assets/tool-download-movie.exe
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
